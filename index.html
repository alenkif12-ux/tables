<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <table>
        <tbody>
            <tr>
                <td colspan="2" class="white"></td>
                <td colspan="2" class="white"></td>
                <td colspan="2" class="yellow"></td>
                <td rowspan="4" class="white, thin"></td>
            </tr>
            <tr>
                <td class="white"></td>
                <td colspan="3" rowspan="2" class="red"></td>
                <td colspan="2" class="yellow"></td>
            </tr>
            <tr>
                <td rowspan="2" class="white"></td>
                <td class="white"></td>
                <td class="white"></td>
            </tr>
            <tr>
                <td rowspan="2" colspan="2" class="black"></td>
                <td class="white"></td>
                <td colspan="2" class="white"></td>
            </tr>
            <tr>
                <td rowspan="3" class="yellow"></td>
                <td class="white"></td>
                <td rowspan="2" colspan="2" class="blue"></td>
                <td rowspan="3" class="red"></td>
            </tr>
            <tr>
                <td rowspan="2" colspan="2" class="white"></td>
                <td class="black"></td>
            </tr>
            <tr>
                <td colspan="3" class="white"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
